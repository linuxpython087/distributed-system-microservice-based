global:
  scrape_interval: 5s

scrape_configs:
  - job_name: "order-service"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["order_service:8000"]


  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8082"]

  - job_name: "node"
    static_configs:
      - targets: ["node-exporter:9100"]