# argocd/order-service-staging.yaml

apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: order-service-staging-kafka
  namespace: argocd

spec:

  project: default

  source:
    repoURL: https://github.com/linuxpython087/distributed-system-microservice-based.git

    targetRevision: HEAD

    path: kubernates/kafka

  destination:
    server: https://kubernetes.default.svc
    namespace: messaging

  syncPolicy:

    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true