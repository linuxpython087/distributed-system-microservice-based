apiVersion: v1

kind: Service

metadata:

  name: {{ .Values.service.name }}

  namespace: {{ .Values.namespace.name }}

  labels:

    app.kubernetes.io/name: {{ .Values.app.name }}

spec:

  selector:

    app.kubernetes.io/name: {{ .Values.app.name }}

  ports:

    - name: metrics

      port: {{ .Values.service.port }}

      targetPort: {{ .Values.service.targetPort }}

  type: {{ .Values.service.type }}