apiVersion: apps/v1
kind: Deployment

metadata:
  name: order-service-api
  namespace: {{ .Values.namespace.name }}

spec:
  replicas: {{ .Values.replicaCount }}

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1

  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.app.name }}

  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Values.app.name }}
        app.kubernetes.io/component: backend
        app.kubernetes.io/instance: {{ .Values.app.name }}

    spec:
      terminationGracePeriodSeconds: 30
      imagePullSecrets:
        - name: dockerhub-secret

      containers:
      - name: order-service

        image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
        imagePullPolicy: {{ .Values.pullPolicy }}

        securityContext:
          runAsNonRoot: true
          runAsUser: 10001
          runAsGroup: 10001
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL

        envFrom:
        - configMapRef:
            name: order-service-configmap

        - secretRef:
            name: order-service-secrets

        ports:
        - containerPort: 8000

        resources:
          requests:
            memory: {{ .Values.resources.requests.memory }}
            cpu:  {{ .Values.resources.requests.cpu }}

          limits:
            memory:  {{ .Values.resources.limits.memory }}
            cpu:  {{ .Values.resources.limits.cpu }}

        startupProbe:
          httpGet:
            path: /startup
            port:  {{ .Values.service.targetPort }}
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 30

        readinessProbe:
          httpGet:
            path: /ready
            port: {{ .Values.service.targetPort }}
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3

        livenessProbe:
          httpGet:
            path: /health
            port: {{ .Values.service.targetPort }}
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3


      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                app:  {{ .Values.app.name }}
            topologyKey: kubernetes.io/hostname