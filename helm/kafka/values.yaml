namespace:

  app: messaging

app:
  name: order-service-api



image:

  repository: tchalimcanonical/order-service

  tag: v3.0.2

  pullPolicy: Always


replicaCount: 3


service:

  type: ClusterIP

  port: 90

  targetPort: 8000
  name: order-service-endpoint


resources:

  requests:

    cpu: 500m

    memory: 256Mi

  limits:

    cpu: 2000m

    memory: 512Mi



ingress:

  enabled: true

  host: order.local


config:

  APP_NAME: order-service

  APP_ENV: production

  LOG_LEVEL: INFO

  KAFKA_BOOTSTRAP: kafka:9092

  DB_HOST: postgres

  DB_PORT: "5432"


monitoring:

  enabled: true

  path: /metrics


imagePullSecret:

  enabled: true

  name: dockerhub-secret


secret:
  DATABASE_PASSWORD: ""
  DOCKER_HUB_USERNAME: ""
  DOCKER_HUB_PASSWORD: ""


postgres:
  host: postgres.database.svc.cluster.local
  port: "5432"
  name: distributed
  user: postgres


data:
  KAFKA_KRAFT_MODE: "true"
  CLUSTER_ID: "1L6g7nGhU-eAKfL--X25wo"

  KAFKA_NODE_ID: "0"

  KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka-0.kafka-headless.messaging.svc.cluster.local:9092"

  KAFKA_CONTROLLER_QUORUM_VOTERS: "0@kafka-0.kafka-headless.messaging.svc.cluster.local:9093"

  KAFKA_PROCESS_ROLES: "broker,controller"
  

  KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"

  KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093"
 

  KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"

  KAFKA_LOG_DIRS: "/tmp/kraft-combined-logs"

  # Performance
  KAFKA_NUM_NETWORK_THREADS: "8"
  KAFKA_NUM_IO_THREADS: "8"

  # Large Events
  KAFKA_MESSAGE_MAX_BYTES: "10485760"
  KAFKA_REPLICA_FETCH_MAX_BYTES: "10485760"

  # Disk Flush
  KAFKA_LOG_FLUSH_INTERVAL_MESSAGES: "10000"