apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: database
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:17

        env:
        - name: POSTGRES_DB
          valueFrom:
            configMapKeyRef:
              name: database-configmap
              key: DATABASE_NAME

        - name: POSTGRES_PORT
          valueFrom:
            configMapKeyRef:
              name: database-configmap
              key: DATABASE_PORT

        - name: POSTGRES_USER
          valueFrom:
            configMapKeyRef:
              name: database-configmap
              key: DATABASE_USER

        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: database-secrets
              key: DATABASE_PASSWORD

        ports:
        - containerPort: 5432

        volumeMounts:
        - name: pgdata
          mountPath: /var/lib/postgresql/data

  volumeClaimTemplates:
  - metadata:
      name: pgdata
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 5Gi