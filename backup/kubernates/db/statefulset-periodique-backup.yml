apiVersion: batch/v1
kind: CronJob

metadata:
  name: postgres-backup
  namespace: order-service

spec:
  schedule: "*/5 * * * *"

  jobTemplate:
    spec:
      template:
        spec:

          restartPolicy: OnFailure

          containers:
          - name: backup
            image: postgres:17

            command:
            - /bin/sh
            - -c
            - |
              pg_dump \
              -h postgres \
              -U postgres \
              distributed \
              > /backup/backup-$(date +%Y%m%d-%H%M).sql

            env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: order-service-secrets
                  key: DATABASE_PASSWORD

            volumeMounts:
            - name: backup-storage
              mountPath: /backup

          volumes:
          - name: backup-storage
            persistentVolumeClaim:
              claimName: postgres-backup-pvc