apiVersion: apps/v1
kind: DaemonSet

metadata:
  name: node-exporter
  namespace: observability

spec:

  selector:
    matchLabels:
      app: node-exporter

  template:

    metadata:
      labels:
        app: node-exporter

    spec:

      hostNetwork: true
      hostPID: true

      containers:

      - name: node-exporter

        image: prom/node-exporter

        args:
          - --path.rootfs=/host

        ports:
          - containerPort: 9100

        volumeMounts:

          - name: root
            mountPath: /host
            readOnly: true

      volumes:

      - name: root
        hostPath:
          path: /