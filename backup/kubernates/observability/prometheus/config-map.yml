apiVersion: v1
kind: ConfigMap

metadata:
  name: prometheus-config
  namespace: observability

data:
  prometheus.yml: |

    global:
      scrape_interval: 5s

    scrape_configs:

      - job_name: "order-service"

        metrics_path: /metrics

        static_configs:

          - targets:
              - order-service-endpoint.order-service.svc.cluster.local:90


      - job_name: node-exporter

        static_configs:
        - targets:
          - node-exporter.observability.svc.cluster.local:9100

      - job_name: cadvisor

        static_configs:
        - targets:
          - cadvisor.observability.svc.cluster.local:8080