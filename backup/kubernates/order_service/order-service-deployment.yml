apiVersion: apps/v1
kind: Deployment

metadata:
  name: order-service-api
  namespace: order-service

spec:
  replicas: 3

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1

  selector:
    matchLabels:
      app.kubernetes.io/name: order-service-api

  template:
    metadata:
      labels:
        app.kubernetes.io/name: order-service-api
        app.kubernetes.io/component: backend
        app.kubernetes.io/instance: order-service-api

    spec:
      terminationGracePeriodSeconds: 30
      imagePullSecrets:
        - name: dockerhub-secret

      containers:
      - name: order-service

        image: tchalimcanonical/order-service:v3.0.1
        imagePullPolicy: Always

        securityContext:
          runAsNonRoot: true
          runAsUser: 10001
          runAsGroup: 10001
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL

        envFrom:
        - configMapRef:
            name: order-service-configmap

        - secretRef:
            name: order-service-secrets

        ports:
        - containerPort: 8000

        resources:
          requests:
            memory: "500Mi"
            cpu: "500m"

          limits:
            memory: "2Gi"
            cpu: "2000m"

        startupProbe:
          httpGet:
            path: /startup
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 30

        readinessProbe:
          httpGet:
            path: /ready
            port: 8000
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3

        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3


      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                app: order-service-api
            topologyKey: kubernetes.io/hostname