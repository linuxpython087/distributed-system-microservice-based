apiVersion: monitoring.coreos.com/v1

kind: ServiceMonitor

metadata:

  name: order-service

  namespace: monitoring

  labels:

    release: prometheus

spec:

  namespaceSelector:

    matchNames:

      - order-service

  selector:

    matchLabels:

      app.kubernetes.io/name: order-service-api

  endpoints:

    - port: metrics

      path: /metrics

      interval: 15s