apiVersion: v1
kind: ConfigMap
metadata:
  name: kafka-config
  namespace: messaging
data:
  KAFKA_KRAFT_MODE: "true"
  CLUSTER_ID: "1L6g7nGhU-eAKfL--X25wo"

  KAFKA_NODE_ID: "0"

  KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka-0.kafka-headless.messaging.svc.cluster.local:9092"

  KAFKA_CONTROLLER_QUORUM_VOTERS: "0@kafka-0.kafka-headless.messaging.svc.cluster.local:9093"

  KAFKA_PROCESS_ROLES: "broker,controller"
  

  KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"

  KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093"
 

  KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"

  KAFKA_LOG_DIRS: "/tmp/kraft-combined-logs"

  # Performance
  KAFKA_NUM_NETWORK_THREADS: "8"
  KAFKA_NUM_IO_THREADS: "8"

  # Large Events
  KAFKA_MESSAGE_MAX_BYTES: "10485760"
  KAFKA_REPLICA_FETCH_MAX_BYTES: "10485760"

  # Disk Flush
  KAFKA_LOG_FLUSH_INTERVAL_MESSAGES: "10000"