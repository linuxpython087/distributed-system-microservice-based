apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-publisher
  namespace: messaging

spec:
  replicas: 1

  selector:
    matchLabels:
      app: order-publisher

  template:
    metadata:
      labels:
        app: order-publisher

    spec:
      terminationGracePeriodSeconds: 30

   
      imagePullSecrets:
        - name: dockerhub-secret

      containers:
        - name: publisher
          image: tchalimcanonical/order-service:v3.0.1
          imagePullPolicy: Always

          command:
            - python
            - -m
            - order_service.src.publisher.run_publisher

          env:
            - name: KAFKA_BOOTSTRAP
              value: "kafka.messaging.svc.cluster.local:9092"

          envFrom:
            - configMapRef:
                name: order-service-configmap

            - secretRef:
                name: order-service-secrets

          resources:
            requests:
              memory: "500Mi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2000m"