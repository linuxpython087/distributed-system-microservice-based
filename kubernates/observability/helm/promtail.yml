# =====================================================
# 1. SERVICE ACCOUNT
# Promtail needs Kubernetes API access
# =====================================================

apiVersion: v1
kind: ServiceAccount

metadata:
  name: promtail
  namespace: monitoring

---

# =====================================================
# 2. RBAC
# Allow Promtail to discover pods
# =====================================================

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole

metadata:
  name: promtail

rules:

- apiGroups: [""]
  resources:
    - pods
    - nodes
    - services
    - endpoints

  verbs:
    - get
    - list
    - watch

---

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding

metadata:
  name: promtail

subjects:

- kind: ServiceAccount
  name: promtail
  namespace: monitoring

roleRef:

  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: promtail

---

# =====================================================
# 3. PROMTAIL CONFIG
# Collect Kubernetes logs
# Parse JSON
# Push → Loki
# =====================================================

apiVersion: v1
kind: ConfigMap

metadata:
  name: promtail-config
  namespace: monitoring

data:

  promtail.yaml: |

    server:

      http_listen_port: 9080
      grpc_listen_port: 0

    positions:

      filename: /tmp/positions.yaml

    clients:

      - url: http://loki-gateway.monitoring.svc.cluster.local/loki/api/v1/push

    scrape_configs:

      - job_name: order-service

        kubernetes_sd_configs:

          - role: pod

        pipeline_stages:

          # Kubernetes container format
          - cri: {}

          # Parse JSON logs
          - json:

              expressions:

                service: service
                environment: environment
                level: level
                event: event
                method: method
                path: path
                duration_ms: duration_ms
                status_code: status_code
                correlation_id: correlation_id

          # Promote JSON → Loki labels
          - labels:

              service:
              environment:
              level:
              method:
              status_code:

        relabel_configs:

          # namespace
          - source_labels:
              [__meta_kubernetes_namespace]

            target_label:
              namespace

          # pod
          - source_labels:
              [__meta_kubernetes_pod_name]

            target_label:
              pod

          # container
          - source_labels:
              [__meta_kubernetes_pod_container_name]

            target_label:
              container

          # app label
          - source_labels:
              [__meta_kubernetes_pod_label_app]

            target_label:
              app

          # job
          - replacement:
              order-service

            target_label:
              job

          # actual log path
          - source_labels:
              [
              __meta_kubernetes_pod_uid,
              __meta_kubernetes_pod_container_name
              ]

            separator: /

            target_label: __path__

            replacement: /var/log/pods/*$1/*.log

---

# =====================================================
# 4. PROMTAIL
# One collector per node
# =====================================================

apiVersion: apps/v1
kind: DaemonSet

metadata:

  name: promtail
  namespace: monitoring

spec:

  selector:

    matchLabels:

      app: promtail

  template:

    metadata:

      labels:

        app: promtail

    spec:

      serviceAccountName: promtail

      containers:

      - name: promtail

        image: grafana/promtail:3.4.3

        args:

          - -config.file=/etc/promtail/promtail.yaml

        ports:

          - containerPort: 9080

        volumeMounts:

          - name: config

            mountPath: /etc/promtail

          - name: varlog

            mountPath: /var/log

            readOnly: true

          - name: pods

            mountPath: /var/log/pods

            readOnly: true

      volumes:

      - name: config

        configMap:

          name: promtail-config

      - name: varlog

        hostPath:

          path: /var/log

      - name: pods

        hostPath:

          path: /var/log/pods

---
