apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: vault-backend
  namespace: database
spec:
  provider:
    vault:
      server: "http://host.docker.internal:8200"
      path: "kv/org"
      version: "v2"
      auth:
        tokenSecretRef:
          name: vault-token
          namespace: vault
          key: token