name: PostgreSQL CI Check

on:
  push:
  pull_request:

jobs:
  build:

    runs-on: ubuntu-latest

    env:
      DATABASE_HOST: localhost
      DATABASE_PORT: 5432
      DATABASE_USER: ${{ secrets.DATABASE_USER }}
      DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
      DATABASE_NAME: ${{ secrets.DATABASE_NAME }}

    services:
      postgres:
        image: postgres:16

        env:
          POSTGRES_USER: ${{ secrets.DATABASE_USER }}
          POSTGRES_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
          POSTGRES_DB: ${{ secrets.DATABASE_NAME }}

        ports:
          - 5432:5432

        options: >-
          --health-cmd="pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
          --health-start-period=10s

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          pip install psycopg2-binary

      - name: Wait for PostgreSQL readiness
        run: |
          echo "Waiting for PostgreSQL..."

          for i in {1..30}; do
            pg_isready -h localhost -p 5432 -U $DATABASE_USER && break
            echo "Not ready yet... attempt $i"
            sleep 2
          done

      - name: Test PostgreSQL connection
        run: |
          python -c "import psycopg2, os

          print('Connecting to DB...')

          conn = psycopg2.connect(
              host='localhost',
              port=5432,
              user=os.environ['DATABASE_USER'],
              password=os.environ['DATABASE_PASSWORD'],
              dbname=os.environ['DATABASE_NAME']
          )

          cur = conn.cursor()
          cur.execute('SELECT 1;')

          print('DB READY AND WORKING:', cur.fetchone())

          conn.close()
          "