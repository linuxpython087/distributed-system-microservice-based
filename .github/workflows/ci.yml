name: Order Service CI - Tests

on:
  push:
  pull_request:

jobs:

  # ========================= UNIT TESTS =========================
  unit-tests:

    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    env:
      DATABASE_HOST: localhost
      DATABASE_PORT: 5432
      DATABASE_USER: ${{ secrets.DATABASE_USER }}
      DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
      DATABASE_NAME: ${{ secrets.DATABASE_NAME }}

    defaults:
      run:
        working-directory: order_service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: |
          pytest tests/unit_tests/


  # ========================= INTEGRATION TESTS =========================
  integration-tests:

    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    defaults:
      run:
        working-directory: order_service

    env:
      DATABASE_HOST: localhost
      DATABASE_PORT: 5432
      DATABASE_USER: ${{ secrets.DATABASE_USER }}
      DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
      DATABASE_NAME: ${{ secrets.DATABASE_NAME }}

    services:
      postgres:
        image: postgres:17

        env:
          POSTGRES_USER: ${{ secrets.DATABASE_USER }}
          POSTGRES_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
          POSTGRES_DB: ${{ secrets.DATABASE_NAME }}

        ports:
          - 5432:5432

        options: >-
          --health-cmd="pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
          --health-start-period=10s

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version:  ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install psycopg2-binary

      - name: Wait for PostgreSQL readiness
        run: |
          echo "Waiting for PostgreSQL..."

          for i in {1..30}; do
            pg_isready -h localhost -p 5432 -U $DATABASE_USER && break
            echo "DB not ready yet... attempt $i"
            sleep 2
          done

      - name: Run repository integration tests
        run: |
          pytest tests/integration/repositories/

      - name: Run service integration tests
        run: |
          pytest tests/integration/

      - name: Run API tests
        run: |
          pytest tests/api/


  # # ========================= API TESTS =========================
  api-tests:

   

    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    defaults:
      run:
        working-directory: order_service

    env:
      DATABASE_HOST: localhost
      DATABASE_PORT: 5432
      DATABASE_USER: ${{ secrets.DATABASE_USER }}
      DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
      DATABASE_NAME: ${{ secrets.DATABASE_NAME }}

    services:
      postgres:
        image: postgres:17

        env:
          POSTGRES_USER: ${{ secrets.DATABASE_USER }}
          POSTGRES_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
          POSTGRES_DB: ${{ secrets.DATABASE_NAME }}

        ports:
          - 5432:5432

        options: >-
          --health-cmd="pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
          --health-start-period=10s

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{matrix.python-version}}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install psycopg2-binary

      - name: Wait for PostgreSQL readiness
        run: |
          echo "Waiting for PostgreSQL..."

          for i in {1..30}; do
            pg_isready -h localhost -p 5432 -U $DATABASE_USER && break
            echo "DB not ready yet... attempt $i"
            sleep 2
          done

      - name: Run repository integration tests
        run: |
          pytest tests/integration/repositories/

      - name: Run service integration tests
        run: |
          pytest tests/integration/

      # - name: Run migrations
      #   run: |
      #     alembic upgrade head

      - name: Run API tests
        run: |
          pytest tests/api/

  
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout code
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Setup Docker Buildx
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # 3. Login to Docker Hub
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # 4. Extract metadata (FIXED)
    - name: Extract metadata (tags)
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ secrets.DOCKERHUB_USERNAME }}/order-service
        tags: |
          type=sha
          type=ref,event=branch
          type=raw,value=latest

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v4

    # 5. buildx
    - name: Buildx
      uses: docker/setup-buildx-action@v4
    

    # 5. Build & Push image
    - name: Build and Push
      uses: docker/build-push-action@v7
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}

