name: Order Service CI

on:
  push:
    branches:
      - main
      - master

  pull_request:

jobs:

  test-order-service:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: order_service

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run tests
        run: |
          pytest -v