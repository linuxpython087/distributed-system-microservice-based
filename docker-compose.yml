

services:
  db:
    image: postgres:17
    container_name: order-postgres
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5435:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER} -d ${DATABASE_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - appnet


  order_service:
    build: .
    container_name: order_service_dist
    depends_on:
      - db
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_USER: postgres
      DATABASE_PASSWORD: Boss2000
      DATABASE_NAME: distributed
      APP_ENV: production
      PYTHONPATH: /app
    ports:
      - "8000:8000"
    networks:
      - appnet



  kafka:
    image: confluentinc/cp-kafka:7.8.3
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_KRAFT_MODE: 'true'
      CLUSTER_ID: '1L6g7nGhU-eAKfL--X25wo'
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs

      # PERFORMANCE 
      KAFKA_NUM_NETWORK_THREADS: 8 
      KAFKA_NUM_IO_THREADS: 8

      # # REPLICATION 
      # KAFKA_DEFAULT_REPLICATION_FACTOR: 3 
      # KAFKA_MIN_INSYNC_REPLICAS: 2

      # LARGE EVENTS 
      KAFKA_MESSAGE_MAX_BYTES: 10485760 
      KAFKA_REPLICA_FETCH_MAX_BYTES: 10485760

      # DISK FLUSH 
      KAFKA_LOG_FLUSH_INTERVAL_MESSAGES: 10000

    volumes:
      - kafka_kraft:/var/lib/kafka/data
    networks:
      - appnet

  loki:
    image: grafana/loki:2.9.8
    container_name: loki
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    networks:
      - appnet

  promtail:
    image: grafana/promtail:2.9.8
    container_name: promtail
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/log:/var/log
      - /var/run/docker.sock:/var/run/docker.sock 
      - ./order_service/src/observability/promtail/promtail.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - appnet




  grafana:
    image: grafana/grafana:10.4.5
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - loki
    networks:
      - appnet

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./order_service/src/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - appnet
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    ports:
      - "8082:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - appnet


  node-exporter:
    image: prom/node-exporter
    container_name: node-exporter
    ports:
      - "9100:9100"
    networks:
      - appnet

  tempo:
    image: grafana/tempo:2.5.0
    container_name: tempo

    command:
      - -config.file=/etc/tempo.yaml

    volumes:
      - ./order_service/src/observability/trace/tempo.yaml:/etc/tempo.yaml

    ports:
      - "3200:3200"
      - "4317:4317"

    networks:
      - appnet



  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.102.1
    container_name: otel-collector

    command:
      - --config=/etc/otelcol/config.yaml

    volumes:
      - ./order_service/src/observability/otel/config.yaml:/etc/otelcol/config.yaml

    ports:
      - "4318:4318"
      - "4319:4317"

    depends_on:
      - tempo

    networks:
      - appnet


  
  
networks:
  appnet:
    driver: bridge

volumes:
  pgdata:
  kafka_kraft: